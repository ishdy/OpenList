name: Auto Sync Other Branches from Main

on:
  # 当 main 分支有新的 push 时触发
  push:
    branches:
      - main
  # 也可以定时触发，例如每天凌晨 3 点
  schedule:
    - cron: '0 3 * * *'
  # 手动触发
  workflow_dispatch:

jobs:
  sync_branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有分支和完整的历史，对于遍历分支很重要
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get all branches except main
        id: get_branches
        run: |
          # 获取所有远程分支，排除 main 和 HEAD
          # 过滤掉一些可能不希望同步的分支，例如 gh-pages, dependabot/xxx 等
          branches=$(git branch -r | grep -v '->' | grep -v 'main' | sed 's/origin\///' | tr '\n' ' ')
          echo "Other branches: $branches"
          echo "branches=$branches" >> $GITHUB_OUTPUT

      - name: Sync each branch with main
        run: |
          MAIN_BRANCH_NAME="main" # 你的主分支名称

          for BRANCH in ${{ steps.get_branches.outputs.branches }}; do
            echo "Attempting to sync $BRANCH with $MAIN_BRANCH_NAME..."

            # 切换到目标分支
            git checkout $BRANCH

            # 尝试合并 main 分支
            # 使用 --no-ff 避免快进合并，保留合并记录
            # 使用 --allow-unrelated-histories 解决两个历史不相关的分支合并问题 (通常不会出现)
            # 使用 || true 防止命令失败导致 workflow 停止，以便处理冲突
            if git merge origin/$MAIN_BRANCH_NAME --no-ff -m "Merge $MAIN_BRANCH_NAME into $BRANCH"; then
              echo "Successfully merged $MAIN_BRANCH_NAME into $BRANCH. Pushing..."
              git push origin $BRANCH
            else
              echo "Merge conflict in $BRANCH. Creating/Updating Pull Request..."
              # 如果有冲突，使用 peter-evans/create-pull-request 创建 PR
              # 这里假设你已经处理了冲突（例如，手动解决或自动解决策略）
              # 更好的做法是在这里利用 create-pull-request 来创建 PR，让开发者去解决冲突。
              # 由于在 GitHub Actions 中自动解决所有可能的冲突很复杂且有风险，
              # 我们通常会选择创建 PR 让人工解决。

              # 恢复分支到合并前的状态，避免提交未解决的冲突
              git merge --abort || true
              git reset --hard origin/$BRANCH || true

              # 调用 peter-evans/create-pull-request 来创建 PR
              # 注意：此 action 会在你当前操作的分支上创建 PR
              # 所以我们需要确保当前分支是目标分支 ($BRANCH)

              # 重新 checkout 到目标分支，以确保其是干净的，并且我们可以从它创建 PR
              git checkout $BRANCH
              git pull origin $BRANCH # 确保本地是最新状态

              # 创建一个临时分支来提交合并操作，以便创建 PR
              TEMP_BRANCH="sync-main-to-$BRANCH-$(date +%s)"
              git checkout -b $TEMP_BRANCH

              # 再次尝试合并，这次我们不处理冲突，而是让 create-pull-request 发现
              if ! git merge origin/$MAIN_BRANCH_NAME --no-ff -m "Merge $MAIN_BRANCH_NAME into $BRANCH from auto-sync"; then
                 echo "Conflicts detected. Proceeding to create PR for $BRANCH."
                 # 不管合并是否成功（可能因为冲突而停止），都尝试创建 PR
                 # peter-evans/create-pull-request 会处理冲突情况并创建草稿 PR
                 # 或者更新已存在的 PR
              fi

              # 使用 peter-evans/create-pull-request 创建 PR
              # 它会自动检测未合并的更改并创建 PR
              echo "::group::Creating Pull Request for $BRANCH"
              PR_INFO=$(gh pr create \
                --base "$BRANCH" \
                --head "$TEMP_BRANCH" \
                --title "Sync: Merge ${{ github.ref_name }} into $BRANCH" \
                --body "This PR merges the latest changes from the \`${{ github.ref_name }}\` branch into \`$BRANCH\`." \
                --draft \
                --json url \
                --repo "${{ github.repository }}" 2>&1 || true) # 将错误输出到 stdout 并继续

              if [[ "$PR_INFO" == *"already exists"* ]]; then
                  echo "Pull Request already exists for $BRANCH. Updating it..."
                  # 如果已经存在 PR，尝试找到并更新它
                  # 由于 gh pr create 已经处理了存在 PR 的情况 (通常会退出或者给出提示)，
                  # 我们可以依赖 create-pull-request action 的能力来更新
                  # 或者手动使用 gh pr list 查找并更新
                  # 为了简化，我们假定 create-pull-request 会处理好这个逻辑
                  # 或者在冲突时，开发者会手动处理并关闭旧PR
                  echo "If the existing PR is not up-to-date, please close it and rerun this workflow."
              elif [[ "$PR_INFO" == *"url"* ]]; then
                  PR_URL=$(echo "$PR_INFO" | jq -r '.url')
                  echo "Pull Request created: $PR_URL"
              else
                  echo "Failed to create or find Pull Request for $BRANCH. Details: $PR_INFO"
                  # 可能没有变化，或者其他错误
              fi
              echo "::endgroup::"

              # 清理临时分支
              git checkout $BRANCH
              git branch -D $TEMP_BRANCH || true # 强制删除
            fi
          done
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 确保 gh CLI 有权限
